[build]
buildCommand = "pnpm run typecheck:libs && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/comunitaes run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "pnpm --filter @workspace/db run push && node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
